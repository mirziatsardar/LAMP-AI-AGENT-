name: Build Lighting Folder

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt pyinstaller

      - name: 创建 config 文件夹
        run: mkdir -p config

      - name: 使用 spec 文件打包（文件夹版 + 暴力收集）
        run: |
          pyinstaller Lighting_Control_System.spec

      - name: 上传打包后的完整文件夹
        uses: actions/upload-artifact@v4
        with:
          name: Lighting_Control_System_Folder
          path: dist/Lighting_Control_System
