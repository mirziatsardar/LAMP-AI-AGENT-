name: Build Lighting Single EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest # 补上 pytest 防止 numpy 报错
          # 验证库是否真的安装成功了
          python -c "import numpy; print('NumPy version:', numpy.__version__)"
          python -c "import sounddevice; print('SoundDevice found')"

      - name: 确保 config 文件夹存在
        shell: cmd
        run: if not exist config mkdir config

      - name: 执行单文件打包
        run: |
          # 增加 --clean 参数，强制刷新
          pyinstaller --clean Lighting_Control_System.spec

      - name: 上传成品 EXE
        uses: actions/upload-artifact@v4
        with:
          name: Lighting_System_Standalone
          # 这里保持 dist/*.exe 是对的，因为单文件模式下 dist 里只有一个 exe
          path: dist/*.exe
